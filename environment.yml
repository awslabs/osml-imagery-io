# Conda environment for osml-imagery-io development
# Create: conda env create -f environment.yml
# Activate: conda activate osml-io
# Update: conda env update -f environment.yml

name: osml-imagery-io-dev
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version (3.12 required for pyo3 0.22+)
  - python=3.12

  # Core dependencies
  - numpy>=1.20

  # Development tools
  - pytest>=7.0
  - pytest-cov>=4.0
  - ruff>=0.1
  - hypothesis>=6.0

  # Build tools (maturin from conda-forge)
  - maturin>=1.7

  # Rust toolchain (optional - can also use system rustup)
  # Uncomment if you want conda to manage Rust:
  # - rust>=1.70

variables:
  # Environment variables set when conda env is activated
  # PyO3 library path is handled by the setup script
  OSML_IO_ENV: "conda"
