name: Deploy Docs to GitHub Pages

on:
  release:
    types: [published]
  push:
    branches: [docs/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  OPENJPEG_VERSION: "2.5.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libjpeg-turbo8-dev libturbojpeg0-dev libtiff-dev
          curl -sL "https://github.com/uclouvain/openjpeg/archive/refs/tags/v${OPENJPEG_VERSION}.tar.gz" | tar xz
          cmake -S "openjpeg-${OPENJPEG_VERSION}" -B build-openjpeg \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_CODEC=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build-openjpeg -j$(nproc)
          sudo cmake --install build-openjpeg
          sudo ldconfig

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build extension and docs
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy sphinx myst-parser sphinx-autodoc-typehints sphinxcontrib-mermaid furo zarr fsspec
          maturin develop --features extension-module,openjpeg,libjpeg-turbo,libtiff
          sphinx-build docs docs/_build/html --keep-going

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
